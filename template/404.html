<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>404 — Không tìm thấy trang | QS Technology</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/qs.css">
<style>
.nf{padding:96px 0;background:#fafaf7;min-height:calc(100vh - 380px);position:relative;overflow:hidden;display:grid;align-items:center}
.nf .qs-grid-bg{position:absolute;inset:0;opacity:.4}
.nf .wrap{position:relative;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.nf .stamp{font-family:var(--font-mono);font-size:11px;color:var(--gold-3);letter-spacing:.2em;text-transform:uppercase;display:flex;gap:12px;align-items:center}
.nf .stamp::before,.nf .stamp::after{content:"";width:32px;height:1px;background:var(--gold);opacity:.6}
.nf .num{font-family:var(--font-display);font-weight:700;font-size:clamp(160px,22vw,280px);line-height:.9;letter-spacing:-.04em;margin:14px 0 0;background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent;position:relative}
.nf .num::after{content:"";position:absolute;left:50%;bottom:8%;width:14px;height:14px;background:#c8553d;border-radius:50%;transform:translateX(-50%);box-shadow:0 0 0 6px rgba(200,85,61,.18)}
.nf h1{font-family:var(--font-display);font-weight:700;font-size:clamp(28px,3vw,40px);letter-spacing:-.015em;margin:14px 0 0;color:var(--ink)}
.nf p{font-size:15px;line-height:1.7;color:#4a4842;margin:14px 0 0;max-width:48ch}
.nf .ctas{display:flex;gap:10px;margin-top:32px}
</style>
</head>
<body>
<script src="scripts/qs-shell.js"></script>
<div id="qs-shell"></div>

<section class="nf">
  <div class="qs-grid-bg"></div>
  <div class="qs-wrap wrap">
    <div class="stamp">Error · E.NF.404</div>
    <div class="num">404</div>
    <h1>Không tìm thấy trang</h1>
    <p>URL bạn vừa truy cập không có trong sơ đồ trang của QS Technology — có thể đã được di chuyển, đổi tên, hoặc bạn gõ sai địa chỉ.</p>
    <div class="ctas">
      <a class="qs-btn gold" href="home.html">← Về trang chủ</a>
      <a class="qs-btn ghost" href="contact.html">Liên hệ</a>
    </div>
  </div>
</section>

<script>QS.mount('');</script>
</body>
</html>
